    VcPartyWrite:
      type: object
      description: >-
        Create or update payload for **`POST /arap/{vc}`**. **Create** â€” omit
        **`id`**. **Update** â€” include **`id`**. JSON keys are merged with
        **`exists`** semantics (you can set fields to **`0`**, **`false`**, or
        empty string when supported by the ledger). **`vcnumber`** is sent as
        `vcnumber`; the server maps it to **`customernumber`** or
        **`vendornumber`**. Omit **`vcnumber`** or leave it blank on **create**
        to assign the next customer/vendor number from defaults (**`GET
        /system/companydefaults`** â†’ **`number_sequences.customer`** /
        **`vendor`**, same family as **`GET /next_number/customer`** /
        **`vendor`**).

        **String limits:** `maxLength` values mirror PostgreSQL **`customer`**
        / **`vendor`**, **`address`**, and **`contact`** columns; the API returns
        **`400`** with **`FieldConstraintError`** before **`CT->save`** when a
        value is too long (or **`curr`** / ISO currency is not exactly 3
        characters when provided).
      additionalProperties: true
      required:
        - name
        - address1
        - city
        - zipcode
        - country
      properties:
        id:
          type: integer
          nullable: true
          description: Set when updating an existing party.
        vcnumber:
          type: string
          nullable: true
          maxLength: 32
          description: >-
            Customer or vendor number. Omit on **create** to auto-assign from
            system defaults.
        customernumber:
          type: string
          nullable: true
          maxLength: 32
        vendornumber:
          type: string
          nullable: true
          maxLength: 32
        name:
          type: string
          maxLength: 128
        contact:
          type: string
          nullable: true
          maxLength: 64
        firstname:
          type: string
          nullable: true
          maxLength: 32
        lastname:
          type: string
          nullable: true
          maxLength: 32
        salutation:
          type: string
          nullable: true
          maxLength: 32
        contacttitle:
          type: string
          nullable: true
          maxLength: 32
        occupation:
          type: string
          nullable: true
          maxLength: 32
        typeofcontact:
          type: string
          nullable: true
          maxLength: 20
        mobile:
          type: string
          nullable: true
          maxLength: 20
        gender:
          type: string
          nullable: true
          maxLength: 1
        notes:
          type: string
          nullable: true
          description: Use this field for searchable integration markers (e.g. `APItest â€¦`).
        address1:
          type: string
          maxLength: 64
        address2:
          type: string
          nullable: true
          maxLength: 64
        street:
          type: string
          nullable: true
          maxLength: 255
        post_office:
          type: string
          nullable: true
          maxLength: 64
        city:
          type: string
          maxLength: 64
        state:
          type: string
          nullable: true
          maxLength: 32
        zipcode:
          type: string
          maxLength: 32
        country:
          type: string
          maxLength: 32
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
          maxLength: 20
        fax:
          type: string
          nullable: true
          maxLength: 20
        taxnumber:
          type: string
          nullable: true
          maxLength: 32
        sic_code:
          type: string
          nullable: true
          maxLength: 6
        language_code:
          type: string
          nullable: true
          maxLength: 6
        curr:
          type: string
          nullable: true
          maxLength: 3
          description: >-
            ISO 4217 code; when non-empty must be exactly 3 characters (matches
            **`customer.curr`** / **`vendor.curr`** **`char(3)`**).
        iban:
          type: string
          nullable: true
          maxLength: 34
        bic:
          type: string
          nullable: true
          maxLength: 11
        gifi_accno:
          type: string
          nullable: true
          maxLength: 30

    StationApprovalRule:
      type: object
      description: >-
        One **`station_approval_rules`** row. **Reads** return DB columns as-is;
        **`all`** rows are persisted with **`operator`** **`eq`**,
        **`condition_value`** **`{}`**, **`condition_field`** **`null`**
        regardless of inputs.
      additionalProperties: true
      properties:
        id:
          type: integer
        station_id:
          type: integer
        rule_type:
          type: string
          enum: [ all, amount ]
          description: >-
            **`all`** â€” unlimited approval ceiling for matching users
            (**`verify_station_access`**). **`amount`** â€” capped by
            **`condition_value`** (total document + tax totals compared on
            post).
        operator:
          type: string
          description: >-
            Stored **`eq`** or **`lte`**. Writes accept only the combinations
            enforced in **`StationRuleInput`** â€” **`amount`** must use **`lte`**
            only.
        condition_field:
          type: string
          nullable: true
          description: >-
            Persisted column; **currently not evaluated** when computing station
            limits (**`verify_station_access`** reads **`condition_value`** only
            for **`amount`** rules).
        condition_value:
          nullable: true
          description: >-
            **`amount`** â€” numeric threshold as plain string (must match
            **`/^\d+(\.\d+)?$/`** on write). May be decoded as JSON in DB;
            runtime code treats non-object values as numeric. **`all`** â€” stored
            as **`{}`** (string **`{}`** in DB).
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true

    StationUserAssignment:
      type: object
      description: Junction row **`station_users`** plus central **`profile`** email
        (as returned).
      properties:
        id:
          type: integer
          description: Primary key on **`station_users`**.
        profile_id:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: integer
          nullable: true
        email:
          type: string
        user_active:
          type: boolean
      additionalProperties: true

    WorkstationStation:
      type: object
      description: One **`stations`** row plus nested **`users`** and **`rules`** when
        returned from list/detail.
      additionalProperties: true
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        is_default:
          type: integer
          nullable: true
        station_type:
          type: string
          nullable: true
          description: >-
            Arbitrary string label used for unique **routing slots** among
            **active** stations â€” at most **one** active station may use a given
            non-null type (server returns **409** on conflict). Plugin code
            references include **`default`** (legacy via **`is_default`**), and
            **`receipt`** (AI bank/ingest flows in **`neo_ai_plugin/AI.pl`**).
            You may define other types for your own automation; they are not
            validated against a fixed enum in SQL.
        workflow_order:
          type: integer
          nullable: true
        is_active:
          type: boolean
          nullable: true
        user_count:
          type: integer
          nullable: true
          description: Included on **`GET /workstations`** list response.
        users:
          type: array
          items:
            $ref: "#/components/schemas/StationUserAssignment"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/StationApprovalRule"

    WorkstationWrite:
      type: object
      description: >-
        Create/update JSON for **`POST /workstations`** (create) or
        **`PUT`**/**`POST /workstations/{id}`** (update).

        **`is_default` (deprecated):** when **`true`** and **`station_type`** is
        omitted, the server sets **`station_type`** to **`default`**.

        **`is_active` trap:** the handler uses Perl truthiness â€” **omitted** or
        **`false`** becomes **`0`** (inactive). To keep a station active on
        update you must send **`"is_active": true`** explicitly.

        **`station_type` uniqueness:** assigning a non-empty type clears that
        type from any other **active** station first.

        **`rules`:** include the key only when you want to replace rules (see
        **Workstations** tag). Use **`[]`** to clear all rules. Omit the
        property on update to leave existing rules unchanged.
      required: [ name ]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        station_type:
          type: string
          nullable: true
        is_default:
          type: boolean
          nullable: true
          deprecated: true
          description: When **`true`** without **`station_type`**, sets **`station_type`**
            **`default`**.
        workflow_order:
          type: integer
          nullable: true
        is_active:
          type: boolean
          nullable: true
          default: true
          description: >-
            **Required `true` on updates** if you intend the station to stay
            active â€” omitted means inactive (**`0`**).
        rules:
          type: array
          nullable: true
          description: Replace-all semantics when the property is present (see
            **Workstations** tag).
          items:
            $ref: "#/components/schemas/StationRuleInput"

    StationRuleInput:
      type: object
      description: >-
        **Write body** for one approval rule. Use exactly one shape â€” **`all`**
        or **`amount`** â€” per array element. Server validates **`rule_type`**,
        **`operator`**, and (for **`amount`**) **`condition_value`** per
        **`process_approval_rules`** in **`WorkStations.pl`**.

        **Errors (400, `error` string):** missing
        **`rule_type`**/**`operator`**; **`rule_type`** not
        **`all`**/**`amount`**; **`amount`** with **`operator`** â‰  **`lte`**;
        **`amount`** without numeric **`condition_value`** matching
        **`/^\d+(\.\d+)?$/`** (integer or decimal string, no sign).
      oneOf:
        - $ref: "#/components/schemas/StationRuleInputAll"
        - $ref: "#/components/schemas/StationRuleInputAmount"

    StationRuleInputAll:
      type: object
      description: >-
        **Unlimited** approval for users linked to this station (subject to
        **`verify_station_access`**). The server **overwrites** whatever you
        send: **`operator`** â†’ **`eq`**, **`condition_value`** â†’ **`{}`**,
        **`condition_field`** â†’ **`null`** before insert.
      required: [ rule_type, operator ]
      properties:
        rule_type:
          type: string
          enum: [ all ]
        operator:
          type: string
          enum: [ eq ]
          description: Must be **`eq`** (server normalizes **`all`** rules to **`eq`**
            anyway).
        condition_field:
          type: string
          nullable: true
          description: Ignored â€” cleared on persist.
        condition_value:
          type: string
          nullable: true
          description: Ignored â€” stored as **`{}`**.

    StationRuleInputAmount:
      type: object
      description: >-
        **Capped approval:** user may approve non-pending vendor/AP postings
        whose computed total (line amounts plus tax lines from
        **`taxaccounts`**) is **â‰¤** **`condition_value`**. **`operator`**
        supported in code **only**: **`lte`**.
      required: [ rule_type, operator, condition_value ]
      properties:
        rule_type:
          type: string
          enum: [ amount ]
        operator:
          type: string
          enum: [ lte ]
        condition_field:
          type: string
          nullable: true
          description: Stored in DB; **not used** when evaluating the ceiling in
            **`verify_station_access`**.
        condition_value:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
          description: >-
            Threshold as a non-negative numeric **string** (e.g. **`"10000"`**,
            **`"10000.50"`**). Leading **`+`/`-`** rejected.

    InvoiceTransferRequest:
      type: object
      description: >-
        **`invoice_id`** is **`ap.id`** (vendor/AP invoice). **`to_station_id`**
        must reference an **active** **`stations`** row. **`transfer_notes`**
        persisted on **`invoice_station_history`** (optional, default empty
        string).
      required: [ invoice_id, to_station_id ]
      properties:
        invoice_id:
          type: integer
        to_station_id:
          type: integer
        transfer_notes:
          type: string
          nullable: true

    InvoiceTransferResponse:
      type: object
      description: >-
        **`from_station_id`** is **`null`** when the invoice had **no**
        **`invoice_station`** row before the transfer (first assignment â€”
        history still records the move).
      properties:
        message:
          type: string
        invoice_number:
          type: string
        from_station_id:
          type: integer
          nullable: true
        to_station_id:
          type: integer
        transferred_by:
          type: integer
        transferred_at:
          type: string

    ARAPTransactionPostErrorResponse:
      type: object
      description: >-
        **`POST /arap/transaction/{vc}/{id}`** failure envelope (see
        **`index.pl`** routing). **`message`** is always present; **`code`** is
        set only for categorized failures (**`drive_response`** accompanies
        **`file_upload_failed`**).
      required: [ message ]
      properties:
        message:
          type: string
        code:
          type: string
          nullable: true
          description: >-
            **`access_denied`** (**403**) â€” workstation subsystem armed
            (**vendor AP**, **`stations`** table non-empty), **`"pending":
            "0"`**, yet **no** joined **`station_users`** +
            **`station_approval_rules`** rows for this **`profile`**
            (**`su.is_active`** / **`sar.is_active`** as in
            **`verify_station_access`**).

            **`amount_exceeded`** (**400**) â€” **`"pending": "0"`**, user has
            **`amount`**-type rules; document total (**sum of
            **`lines[].amount`** plus taxes merged from line-level tax or
            **`taxes`**) exceeds the **max** numeric **`condition_value`**
            observed on those **`amount`** rules (**`message`** repeats
            amounts).

            **`no_amount_rules`** (**400**) â€” user lines up with stations but
            the rule set carries **neither** **`all`** nor **`amount`** entries
            the code recognizes; bypass by posting **`"pending": "1"`** / omit
            **`pending`**.

            **`post_transaction_failed`** (**500**) â€” **`AA->post_transaction`**
            raised.

            **`file_upload_failed`** (**400**) â€” **`FM->upload_files`** failed
            after the document posted (**`drive_response`** when present).
        drive_response:
          description: Present for some cloud upload failures.
          nullable: true

    PluginLegacyErrorResponse:
      type: object
      description: >-
        Legacy plugin JSON errors use an **`error`** property instead of
        **`message`**.
      properties:
        error:
          type: string
      required:
        - error

    WorkstationAssignUserBody:
      type: object
      description: >-
        **`profile_id`** is the central authentication **`profile.id`** (matches
        **`id`** from **`GET /workstations/users`**).
      required: [ profile_id ]
      properties:
        profile_id:
          type: integer

    WorkflowPendingInvoice:
      type: object
      description: >-
        Unapproved (**`approved = false`**) **`ap`** invoice joined for the
        operator inbox (**`GET /workstations/user/stations`**). **`amount`** /
        **`netamount`** may be scaled by **`exchangerate`** (`round_amount` in
        plugin). Rows include many extra vendor/bank/address/`files` columns â€”
        schema allows **`additionalProperties`**.
      additionalProperties: true
      properties:
        id:
          type: integer
        invnumber:
          type: string
        transdate:
          type: string
          format: date
        vendor_id:
          type: integer
          nullable: true
        vendor_name:
          type: string
          nullable: true
        amount:
          type: number
          nullable: true
        netamount:
          type: number
          nullable: true
        curr:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/File"

    WorkstationOperatorInbox:
      type: object
      properties:
        stations:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              id:
                type: integer
              name:
                type: string
              invoices:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowPendingInvoice"
              is_unassigned:
                type: boolean
                nullable: true

    DatasetProfileRow:
      type: object
      description: Central **`profile`** with dataset access â€” response of **`GET
        /workstations/users`**.
      additionalProperties: true
      properties:
        id:
          type: integer
        email:
          type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        access_level:
          type: string
          nullable: true
        access_created_at:
          type: string
          format: date-time
          nullable: true

    WorkstationMutationEnvelope:
      type: object
      properties:
        message:
          type: string
        id:
          type: integer

paths:
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Customers & Vendors (counterparties)
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /arap/list/{vc}:
    get:
      tags:
        - Customers & Vendors
      summary: Lightweight picker list â€” all customers or vendors
      description: >-
        Returns `{ id, name, customernumber|vendornumber, â€¦, label }` rows for
        transaction/invoice dropdowns. Requires at least one of the listed
        transaction/draft permissions per `vc`.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
      responses:
        "200":
          description: Array of party summary rows for pickers.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /arap/list/{vc}/{id}:
    get:
      tags:
        - Customers & Vendors
      summary: Picker detail â€” one party with address and bank accounts
      description: >-
        Returns a compact party object including `label`, `full_address`, and
        `bank_accounts` for use in AR/AP forms.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Party detail for pickers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VcParty"
        "400":
          description: Invalid `vc`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /arap/{vc}:
    get:
      tags:
        - Customers & Vendors
      summary: Search customers or vendors
      description: >-
        Full-text-style search backed by SQL-Ledger CT search. Filter by passing
        any combination of supported query keys (examples: `name`, `notes`,
        `customernumber` / `vendornumber`, `city`, `email`, â€¦). When no rows
        match, returns an empty JSON array `[]`.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
        - in: query
          name: name
          schema: { type: string }
          description: Partial match on party name (`ILIKE`).
        - in: query
          name: notes
          schema: { type: string }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: email
          schema: { type: string }
      responses:
        "200":
          description: Matching parties (possibly empty array).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VcParty"
    post:
      tags:
        - Customers & Vendors
      summary: Create or update a customer or vendor
      description: >-
        Persists a party via **`CT->save`**. **Create** â€” omit **`id`**.
        **Update** â€” include **`id`**; only fields present in the JSON are
        copied (with **`exists`** semantics for scalars). Omit **`vcnumber`** on
        **create** to assign the next number from system defaults (**`GET
        /system/companydefaults`**, or reserve explicitly with **`GET
        /next_number/customer`** / **`vendor`**). Requires **`customer.add`** or
        **`vendor.add`**.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VcPartyWrite"
            example:
              vcnumber: "C-API-001"
              name: "Example AG"
              notes: "APItest May 2026"
              address1: "Teststr 1"
              city: "ZĂĽrich"
              zipcode: "8000"
              country: "CH"
      responses:
        "200":
          description: Full form object after save (includes generated `id` on create).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VcParty"
        "400":
          description: >-
            Request body string exceeds a PostgreSQL column limit for **`customer`**
            / **`vendor`**, **`address`**, or **`contact`** ( **`FieldConstraintError`** ).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldConstraintError"

  /arap/{vc}/{id}:
    get:
      tags:
        - Customers & Vendors
      summary: Load one customer or vendor for editing
      description: >-
        Returns the full party form with AR/AP account links, tax assignments,
        resolved email templates (`message`, `reminder_*_message`), and
        `discount` expressed as a **percentage** (multiplied by 100 from the
        internal stored value for the API response). Requires `customer.add` /
        `vendor.add` (same as the UI edit form).
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Party master record for editing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VcParty"

  /auth/validate_api:
    post:
      tags:
        - Auth
      summary: Validate API key for a dataset
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: API key is valid and active.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: integer
              example:
                success: 1
        "400":
          description: Missing `X-API-Key` header.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Missing X-API-Key header"
        "401":
          description: Invalid, inactive, or expired API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Invalid, inactive, or expired API key"
        "403":
          description: API key has no access to this dataset.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "API key has no access to dataset neoledger"
        "404":
          description: Dataset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Unknown dataset: neoledger"

  /gl/transactions/lines:
