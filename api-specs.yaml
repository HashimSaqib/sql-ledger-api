  /open_invoices/{vc}:
    get:
      tags:
        - Payments
      summary: List open (unpaid) invoices
      description: >-
        Returns open or partially paid invoices for **`vc`**. This document
        describes the **`customer`** (sales invoice / cash receipts) case.
        Requires **`cash.receipts`** when **`vc`** is **`customer`**.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
          description: Entity type.
        - in: query
          name: customer_id
          schema: { type: integer }
          description: Filter by customer ID (use for vc=customer).
        - in: query
          name: vendor_id
          schema: { type: integer }
          description: Filter by vendor ID (use for vc=vendor).
        - in: query
          name: currency
          schema: { type: string }
          description: Filter by currency code.
        - in: query
          name: fromdate
          schema: { type: string, format: date }
          description: Filter invoices from this date.
        - in: query
          name: todate
          schema: { type: string, format: date }
          description: Filter invoices up to this date.
        - in: query
          name: duedatefrom
          schema: { type: string, format: date }
          description: Filter by due date from.
        - in: query
          name: duedateto
          schema: { type: string, format: date }
          description: Filter by due date to.
        - in: query
          name: department
          schema: { type: string }
          description: Filter by department.
        - in: query
          name: paymentmethod
          schema: { type: string }
          description: Filter by payment method.
      responses:
        "200":
          description: Array of open invoice summaries (empty array if none found).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenInvoiceItem"
              example:
                - id: 101
                  invnumber: "AR-2025-001"
                  transdate: "2025-11-01"
                  duedate: "2025-11-30"
                  name: "ACME Corp"
                  netamount: 1000.00
                  amount: 1077.00
                  paid: 0.00
                  due: 1077.00
                  curr: "CHF"
                  invoice: 1
        "400":
          description: Invalid `vc` parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Invalid vc parameter. Must be customer or vendor"
    post:
      tags:
        - Payments
      summary: Post cash receipts against open invoices
      description: >-
        Posts one or more payments against open invoices (**`customer`**
        documented here).

        - **`individual`** â€” post a single payment batch with per-invoice
        **`paid`** amounts. - **`group`** â€” post separate payment batches per
        counterparty group, each with invoice selection.

        After posting, the system regenerates invoice PDFs where applicable.

        Requires **`cash.receipts`** when **`vc`** is **`customer`**.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
          description: Entity type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ account, date, payments, method ]
              properties:
                account:
                  type: string
                  description: Bank/cash account number to post the payment to (e.g. "1020").
                date:
                  type: string
                  format: date
                  description: Payment date (YYYY-MM-DD).
                method:
                  type: string
                  enum: [ individual, group ]
                  description: Payment method â€” `individual` or `group`.
                currency:
                  type: string
                  nullable: true
                  minLength: 3
                  maxLength: 3
                  description: >-
                    Payment currency. Defaults to the base currency. When sent,
                    must be exactly 3 characters (ISO 4217; **`ar.curr`** / **`ap.curr`** **`char(3)`**).
                exchangerate:
                  type: number
                  nullable: true
                  description: Exchange rate. Defaults to 1.
                source:
                  type: string
                  nullable: true
                  description: Payment reference.
                memo:
                  type: string
                  nullable: true
                payments:
                  type: array
                  description: >-
                    For `method=individual`: array of invoice payment rows. For
                    `method=group`: array of payment group objects.
                  items:
                    type: object
                    description: >-
                      Individual mode: `{ id, paid }`. Group mode: `{ vc_id,
                      total_amount, invoices: [{id, paid}] }`.
            example:
              account: "1020"
              date: "2025-11-15"
              method: "individual"
              payments:
                - id: 101
                  paid: 1077.00
      responses:
        "200":
          description: Payment(s) posted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: integer
                    enum: [ 1 ]
                  message:
                    type: string
                  method:
                    type: string
                  total_amount:
                    type: number
                  payments_processed:
                    type: integer
              example:
                success: 1
                message: "Payment(s) posted successfully"
                method: "individual"
                total_amount: 1077.00
                payments_processed: 1
        "400":
          description: >-
            Missing or invalid fields, or **`FieldConstraintError`** when **`currency`**
            is non-empty and not exactly 3 characters.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/FieldConstraintError"
                  - $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Missing required fields: account, date, payments, method"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # SYSTEM â€” Company defaults
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /system/companydefaults:
    get:
      tags:
        - System
      summary: Read company & system defaults
      description: >-
        Returns restructured company master data, financial settings, **account
        defaults** (chart ids for IC / AR / AP / FX / cash-over-short), **number
        sequence templates** (`glnumber`, `sinumber`, `customernumber`,
        `partnumber`, â€¦) with lock flags, chart pick lists, and SMTP metadata.
        Drives auto-assigned **reference**, **invoice numbers**,
        **customer/vendor numbers**, and **catalogue part numbers** when those
        fields are omitted on create routes. Requires **`system.defaults`**
        permission.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Defaults bundle (structure matches `CompanyDefaults` schema).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyDefaults"
        "403":
          description: Missing `system.defaults` permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - System
      summary: Save company & system defaults
      description: >-
        Partial update: include only sections you want to change
        (`company_info`, `settings`, `account_defaults`, `number_sequences`,
        `smtp`). Omitted top-level keys are not cleared. Persists via
        **`AM->save_defaults`**. Requires **`system.defaults`** permission.

        **String limits:** **`settings.type_of_contact`** (max **20** characters,
        matches **`contact.typeofcontact`**-style usage), **`company_info.name`**
        (**128**), address lines (**64**â€“**255** by field), and **`company_info.contact`**
        **`phone` / `fax`** (**20**) are validated early; overloads return **`400`**
        **`FieldConstraintError`** (SMTP test failures may still return plain
        **`ErrorResponse`**).
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyDefaults"
      responses:
        "200":
          description: Defaults saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyDefaultsSaveResult"
              example:
                status: success
                message: Company defaults saved successfully
        "400":
          description: >-
            Field length validation (**`FieldConstraintError`**) or SMTP test /
            other save validation (**`ErrorResponse`**).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/FieldConstraintError"
                  - $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Save rejected by the ledger.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Failed to save company defaults

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # REFERENCE DATA â€” Chart of Accounts
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /system/chart/accounts:
    get:
      tags:
        - Reference Data
      summary: List all chart of accounts entries
      description: >-
        Returns all account entries in the chart of accounts, each with its
        assigned reporting categories. Requires `system.chart.list` permission.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Array of chart account entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartAccount"
              example:
                - id: 1
                  accno: "1000"
                  description: "Cash"
                  charttype: "A"
                  category: "A"
                  link: "AR_paid:AP_paid"
                  contra: 0
                  categories: []

  /system/chart/accounts/{id}:
    get:
      tags:
        - Reference Data
      summary: Get a single chart account
      description: >-
        Returns one chart account with full detail, usage flags
        (`has_transactions`, `has_defaults`, `has_parts`), and assigned
        categories. Requires `system.chart.list` permission.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Chart account ID.
      responses:
        "200":
          description: Chart account detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartAccountDetail"
              example:
                id: 1
                accno: "1000"
                description: "Cash"
                charttype: "A"
                category: "A"
                link: "AR_paid:AP_paid"
                contra: 0
                has_transactions: true
                has_defaults: false
                has_parts: false
                categories: []
    post:
      tags:
        - Reference Data
      summary: Create or update a chart account
      description: >-
        Creates a new account (omit `{id}`) or updates an existing one.
        Optionally replaces the full set of category assignments via
        `category_ids`. Requires `system.chart.add` permission.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: false
          schema:
            type: integer
          description: Account ID for updates. Omit to create.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ChartAccount"
                - type: object
                  properties:
                    category_ids:
                      type: array
                      nullable: true
                      description: >-
                        Full replacement list of category IDs to assign. When
                        provided, all existing assignments are replaced.
                      items:
                        type: integer
            example:
              accno: "4000"
              description: "Revenue"
              charttype: "A"
              category: "I"
              link: "AR_amount"
              contra: 0
              category_ids: [ 1, 2 ]
      responses:
        "200":
          description: Account saved. Returns the full account with its categories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartAccountDetail"
        "400":
          description: >-
            **`FieldConstraintError`** when **`symbol_link`** exceeds 128 characters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldConstraintError"
    delete:
      tags:
        - Reference Data
      summary: Delete a chart account
      description: >-
        Deletes a chart account. Returns `400` if the account has posted
        transactions, is referenced by system defaults, or is linked to any
        part/service. Requires `system.chart.add` permission.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Chart account ID to delete.
      responses:
        "200":
          description: Account deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Account deleted"
        "400":
          description: Account cannot be deleted (has transactions, defaults, or parts).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Cannot delete account: transactions exist"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # REFERENCE DATA â€” Currencies
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /system/currencies:
    get:
      tags:
        - Reference Data
      summary: List currencies
      description: >-
        Returns all currencies configured in the system. The currency with
        `rn=1` is the base currency. Requires `system.currencies` permission.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Array of currencies.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Currency"
              example:
                - curr: "CHF"
                  prec: 2
                  rn: 1
                - curr: "EUR"
                  prec: 2
                  rn: 2
    post:
      tags:
        - Reference Data
      summary: Create or update a currency
      description: >-
        Creates a new currency or updates an existing one (upsert by code).
        Requires `system.currencies` permission.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ curr, prec ]
              properties:
                curr:
                  type: string
                  pattern: "^[A-Z]{3}$"
                  description: ISO 4217 currency code (exactly 3 uppercase letters).
                prec:
                  type: integer
                  minimum: 0
                  maximum: 10
                  description: Decimal places (0â€“10).
            example:
              curr: "USD"
              prec: 2
      responses:
        "201":
          description: Currency created or updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Currency created successfully"
        "400":
          description: Invalid currency code or precision value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Invalid input parameters"

  /system/currencies/{curr}:
    delete:
      tags:
        - Reference Data
      summary: Delete a currency
      description: >-
        Deletes a currency by its code. Requires `system.currencies` permission.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: curr
          required: true
          schema:
            type: string
            pattern: "^[A-Z]{3}$"
          description: ISO 4217 currency code (e.g. USD).
      responses:
        "204":
          description: Currency deleted. No response body.
        "400":
          description: Invalid currency code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Invalid currency code"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # REFERENCE DATA â€” Departments
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /system/departments:
    get:
      tags:
        - Reference Data
      summary: List departments
      description: >-
        Returns all departments in display order. Each entry includes a
        `transactions` flag indicating whether the department has any associated
        transactions (relevant before delete). Requires `system.departments`
        permission.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Array of departments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
              example:
                - id: 1
                  description: "Sales"
                  role: "P"
                  rn: 1
                  transactions: 0
    post:
      tags:
        - Reference Data
      summary: Create or update a department
      description: >-
        Creates a new department or updates an existing one. Required fields:
        `description`. Optional: `role` (C or P), `id` (for update). Requires
        `system.departments` permission.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Department"
              example:
                description: "Operations"
                role: "C"
      responses:
        "200":
          description: Department saved. Returns the updated departments array.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
        "400":
          description: >-
            **`FieldConstraintError`** when **`role`** is longer than one character.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldConstraintError"

  /system/departments/{id}:
    delete:
      tags:
        - Reference Data
      summary: Delete a department
      description: >-
        Deletes a department. Returns `409 Conflict` if the department has
        associated transactions. Requires `system.departments` permission.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Department ID to delete.
      responses:
        "204":
          description: Department deleted. No response body.
        "400":
          description: Missing or invalid department ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Missing department ID"
        "409":
          description: Department has associated transactions and cannot be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Department cannot be deleted because it has associated transactions"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # REFERENCE DATA â€” Taxes
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /system/taxes:
    get:
      tags:
        - Reference Data
      summary: List tax rates
      description: >-
        Returns all configured tax rates with their linked chart accounts.
        Requires `system.taxes` permission.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Array of tax rate entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxRate"
              example:
                - id: 1
                  chart_id: 55
                  accno: "2200"
                  description: "VAT 7.7%"
                  rate: 0.077
                  taxnumber: null
                  validto: null

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # ITEMS â€” Services catalogue
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /ic/items:
    get:
      tags:
        - Items
      summary: Search catalogue services (and catalogue rows)
      description: >-
        Searches the catalogue. The **`searchitems` query parameter is
        required** and controls scope and permission (`items.search.*`):

        `allitems` â€” every catalogue row â€˘ `part` â€˘ `service`.

        Upsert semantics for **services** (`POST /ic/items/{id}`) use **`income_accno`** and **`expense_accno`**
        (chart **`accno`** strings with **`IC_income`** / **`IC_expense`** in `link`). Both are required on **create**.
        Numeric account ids or `IC_income` as a JSON key are not accepted on **`POST`**.
        Sending `inventory_accno*` on that route is rejected.
      operationId: searchIcItems
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: searchitems
          required: true
          schema:
            type: string
            enum: [ allitems, part, service ]
          description: Scope of the search. Also determines the required permission.
        - in: query
          name: partnumber
          schema: { type: string }
          description: Filter by part number (partial match).
        - in: query
          name: description
          schema: { type: string }
          description: Filter by description (partial match).
        - in: query
          name: serialnumber
          schema: { type: string }
          description: Filter by serial number.
        - in: query
          name: barcode
          schema: { type: string }
          description: Filter by barcode.
        - in: query
          name: make
          schema: { type: string }
          description: Filter by manufacturer.
        - in: query
          name: model
          schema: { type: string }
          description: Filter by model.
      responses:
        "200":
          description: >-
            JSON array of matching rows (never `null`; use **`[]`** when nothing
            matches).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemSummary"
              example: []
        "400":
          description: Missing required `searchitems` parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "searchitem is required."

  /ic/items/{id}:
    get:
      tags:
        - Items
      summary: Get one catalogue service row
      description: >-
        Returns full detail for one catalogue **`id`**. Intended for **service** lines;
        requires **`items.service`**. Writing uses the same permission (**`POST`** below).
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Part ID.
      responses:
        "200":
          description: Part or service detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemSummary"
              example:
                id: 10
                partnumber: "SVC-01"
                description: "Cloud Hosting"
                unit: "month"
                sellprice: 500.00
                onhand: 0
                taxaccounts: "34970"
                income_accno: "3400"

    post:
      tags:
        - Items
      summary: Create or update a service
      description: >-
        Path **`id = 0`** creates a row. Requires **`items.service`** only.
        Send **`income_accno`** and **`expense_accno`** (chart **`accno`** strings; rows must have **`IC_income`** / **`IC_expense`** in **`link`**, e.g. **`"3400"`** and an expense **`accno`** on your chart).
      operationId: upsertIcService
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Catalogue row id (`0` = create).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemServiceUpsert"
            example:
              partnumber: "SVC-CH-3400"
              description: "APItest consulting engagement"
              unit: "hour"
              sellprice: 195.00
              income_accno: "3400"
              expense_accno: "4999"
              taxaccounts:
                - "34970"
      responses:
        "200":
          description: Saved catalogue row (**create** shares the **200** response today).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                id: 10
                partnumber: "SVC-CH-3400"
                item: "service"
        "400":
          description: >-
            Validation error (wrong chart link, missing income, forbidden inventory
            payload), or **`FieldConstraintError`** when **`unit`** exceeds 5 characters.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/FieldConstraintError"
                  - $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing catalogue permission.

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # WORKSTATIONS (Neo AI plugin â€” neo_ai_plugin/WorkStations.pl)
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /workstations:
    get:
      tags:
        - Workstations
      summary: List workstations
      description: >-
        Active **`stations`** with nested **`users`** (central profile email)
        and **`station_approval_rules`**. Each list row includes
        **`user_count`**. Requires **`stations.manage`**.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Array of stations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkstationStation"
        "403":
          description: Missing **`stations.manage`**.
    post:
      tags:
        - Workstations
      summary: Create workstation
      description: >-
        **Create** â€” **`POST`** to **`â€¦/workstations`** with **no trailing id
        segment** (Mojolicious pattern **`/workstations/:id`** where **`id`** is
        optional). Response **201** with **`message`** + **`id`**.

        Sending **`rules`** (including **`[]`**) persists those rules
        immediately after **`stations`** insert (**empty** â‡’ no
        **`station_approval_rules`** rows).

        Omitting **`is_active`** creates an **inactive** station â€” send
        **`true`** explicitly for an active workstation.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkstationWrite"
            example:
              name: "AP approval"
              description: "Purchasing review"
              workflow_order: 1
              rules:
                - rule_type: amount
                  operator: lte
                  condition_value: "10000"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkstationMutationEnvelope"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
        "403":
          description: Missing **`stations.manage`**.
        "409":
          description: Duplicate station name or conflicting **`station_type`**.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"

  /workstations/users:
    get:
      tags:
        - Workstations
      summary: Dataset users (for assignment pickers)
      description: Active central **`profile`** rows with **`dataset_access`** to this
        client. **`stations.manage`**.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatasetProfileRow"
        "403":
          description: Missing **`stations.manage`**.
        "404":
          description: Dataset not found in central DB.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"

  /workstations/transfer-invoice:
    post:
      tags:
        - Workstations
      summary: Transfer AP invoice to another station
      description: >-
        Targets **`invoice_station`** rows for **`ap`** only (**`invoice_id` =
        `ap.id`** â€” not **`ar`**). Validates that the destination station exists
        and differs from current assignment (**400** repeat). Writes
        **`invoice_station_history`**.

        **`vendor.transaction`** permission.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceTransferRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceTransferResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
        "403":
          description: Missing **`vendor.transaction`**.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"

  /workstations/user/stations:
    get:
      tags:
        - Workstations
      summary: My stations with pending vendor invoices
      description: >-
        **`stations.get`** â€” returns **`{ stations: [...] }`**; each station
        lists unapproved **`ap`** invoices joined with vendor/bank/address
        columns, **`files`** via **`FM`**, optional plugin enrichments. Admin
        users also receive synthetic **Unassigned** (**`id`**: **`-1`**) for AP
        rows with no **`invoice_station`** row.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkstationOperatorInbox"
        "403":
          description: Missing **`stations.get`**.

  /workstations/{id}:
    get:
      tags:
        - Workstations
      summary: Workstation detail
      description: Requires **`stations.manage`**.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkstationStation"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
        "403":
          description: Missing **`stations.manage`**.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
    put:
      tags:
        - Workstations
      summary: Update workstation
      description: >-
        **`PUT`** (**`POST`** on the **same `/workstations/{id}`** pattern is
        treated identically by the plugin).

        Include **`rules`** only when rewriting approval rules (**`[]`** wipes
        them). Omit **`rules`** to leave DB rules untouched.

        Always send **`"is_active": true`** unless you intentionally deactivate
        (**omission â‡’ inactive **`0`** in handler**).
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkstationWrite"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkstationMutationEnvelope"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
        "403":
          description: Missing **`stations.manage`**.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
    delete:
      tags:
        - Workstations
      summary: Deactivate workstation
      description: Soft-delete â€” sets **`is_active`** false; fails with **409** if
        active users remain.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deactivated.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
        "403":
          description: Missing **`stations.manage`**.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"

  /workstations/{id}/users:
    post:
      tags:
        - Workstations
      summary: Assign user to workstation
      description: >-
        Inserts **`station_users`** after verifying the station and
        **`profile`** exist. **201** for a brand-new link; **200** when a prior
        row already existed (reactivation path that only backfills
        **`created_by`**). **409** when the pair is already assigned and
        **`created_by`** was already set (duplicate). Deletes use **`DELETE
        â€¦/users/{user_id}`** with **`user_id` = this same `profile_id`**.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkstationAssignUserBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkstationMutationEnvelope"
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkstationMutationEnvelope"
        "403":
          description: Missing **`stations.manage`**.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"

  /workstations/{id}/users/{user_id}:
    delete:
      tags:
        - Workstations
      summary: Remove user from workstation
      description: >-
        **`user_id`** is the central **`profile.id`**
        (**`station_users.profile_id`**), not the junction row **`id`**.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: user_id
          required: true
          schema:
            type: integer
          description: Central profile id (**`profile_id`**).
      responses:
        "204":
          description: Removed.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"
        "403":
          description: Missing **`stations.manage`**.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginLegacyErrorResponse"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # REFERENCE DATA â€” Next Number
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /next_number/{module}:
    get:
      tags:
        - Reference Data
      summary: Get (and increment) the next document number
      description: >-
        Returns the next sequential document number for the given module and
        increments the counter. Call this once per new document to reserve a
        number before saving (optional â€” many **POST** routes will allocate from
        the same defaults when the number field is omitted; see **`GET
        /system/companydefaults`**).

        Supported modules and their required permissions:

        | `module` | Sequence | Required permission | |---|---|---| | `gl` | GL
        number | `gl.add` or `gl.import` | | `ar` | AR invoice number |
        `customer.transaction` or `customer.invoice` | | `ap` | AP invoice
        number | `vendor.transaction` or `vendor.invoice` | | `customer` |
        Customer number | `customer.add` or `customer.import` | | `vendor` |
        Vendor number | `vendor.add` or `vendor.import` | | `customer_order` |
        Sales order number | `customer.order` | | `customer_quotation` |
        Quotation number | `customer.quotation` | | `vendor_order` | Purchase
        order number | `vendor.order` | | `vendor_quotation` | RFQ number |
        `vendor.quotation` |
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: module
          required: true
          schema:
            type: string
            enum:
              - gl
              - ar
              - ap
              - customer
              - vendor
              - customer_order
              - customer_quotation
              - vendor_order
              - vendor_quotation
          description: Module identifier.
      responses:
        "200":
          description: The next sequential number for the module.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextNumberResponse"
              example:
                number: "AR-2025-042"
