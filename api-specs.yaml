  # AR/AP TRANSACTIONS (non-invoice)
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /arap/transactions/{vc}:
    get:
      tags:
        - AR/AP Transactions
      summary: List AR or AP transactions
      description: >-
        Returns a filtered, pageable list of AR (customer) or AP (vendor)
        transactions with running totals across all returned rows. All query
        parameters are optional filters.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
          description: Entity type â€” `customer` for AR, `vendor` for AP.
        - in: query
          name: transdatefrom
          schema: { type: string, format: date }
          description: Filter transactions from this date (YYYY-MM-DD inclusive).
        - in: query
          name: transdateto
          schema: { type: string, format: date }
          description: Filter transactions up to this date (YYYY-MM-DD inclusive).
        - in: query
          name: invnumber
          schema: { type: string }
          description: Filter by invoice/document number (partial match).
        - in: query
          name: ordnumber
          schema: { type: string }
          description: Filter by order number.
        - in: query
          name: ponumber
          schema: { type: string }
          description: Filter by purchase order number.
        - in: query
          name: description
          schema: { type: string }
          description: Filter by description (partial match).
        - in: query
          name: notes
          schema: { type: string }
          description: Filter by notes.
        - in: query
          name: source
          schema: { type: string }
          description: Filter by source reference.
        - in: query
          name: employee
          schema: { type: string }
          description: Filter by employee.
        - in: query
          name: department
          schema: { type: string }
          description: Filter by department.
        - in: query
          name: vc_id
          schema: { type: integer }
          description: Filter by customer or vendor ID (supports comma-separated values).
        - in: query
          name: outstanding
          schema: { type: integer, enum: [ 0, 1 ] }
          description: 1 = only include outstanding (partially/fully unpaid) transactions.
        - in: query
          name: open
          schema: { type: integer, enum: [ 0, 1 ] }
          description: 1 = include open transactions.
        - in: query
          name: closed
          schema: { type: integer, enum: [ 0, 1 ] }
          description: 1 = include fully paid transactions.
        - in: query
          name: onhold
          schema: { type: integer, enum: [ 0, 1 ] }
          description: 1 = include on-hold transactions.
      responses:
        "200":
          description: Filtered transaction list with totals.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ARAPTransactionsResponse"
              example:
                transactions:
                  - id: 101
                    invnumber: "AR-2025-001"
                    transdate: "2025-11-01"
                    duedate: "2025-11-30"
                    name: "ACME Corp"
                    amount: 1180.00
                    netamount: 1000.00
                    paid: 0.00
                    paymentdiff: 1180.00
                    tax: 180.00
                    curr: "CHF"
                totals:
                  amount: 1180.00
                  netamount: 1000.00
                  paid: 0.00
                  paymentdiff: 1180.00
                  tax: 180.00
        "400":
          description: Invalid `vc` value or malformed date filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Invalid date format for transdatefrom. Use YYYY-MM-DD."
        "404":
          description: No transactions match the supplied filters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "No transactions found"

  /arap/transaction/{vc}/{id}:
    get:
      tags:
        - AR/AP Transactions
      summary: Get a single AR or AP transaction
      description: >-
        Returns full detail of one AR (customer) or AP (vendor) transaction,
        including line items, recorded payments, tax summary, and attached
        files. The `type` field identifies `transaction`, `credit_note` (AR), or
        `debit_note` (AP).
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
          description: Entity type â€” `customer` for AR, `vendor` for AP.
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Transaction ID.
      responses:
        "200":
          description: Full transaction detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ARAPTransactionDetail"
              example:
                id: 101
                type: "transaction"
                pending: "0"
                customernumber: "C-001"
                customer_id: 5
                invNumber: "AR-2025-001"
                invDate: "2025-11-01"
                dueDate: "2025-11-30"
                currency: "CHF"
                exchangerate: 1
                recordAccount: { accno: "1100", description: "Accounts Receivable" }
                lineitems:
                  - accno: "4000"
                    description: "Consulting"
                    amount: 1000.00
                    taxAccount: "2200"
                    taxAmount: 77.00
                payments: []
                files:
                  - id: 5020
                    name: "contract-appendix.pdf"
                    link: "https://apineo.hashimsaqib.com/client/neoledger/files/ar-txn-5020abcd"
    post:
      tags:
        - AR/AP Transactions
      summary: Create or update an AR or AP transaction
      description: >-
        Creates a new transaction when **`{id}`** is omitted, or updates an
        existing transaction when **`{id}`** is provided.

        Accepts **`application/json`** or **`multipart/form-data`** (for file
        attachments).

        **Key naming:** currency must be **`curr`** in the request body
        (**`currency`** on responses).

        **`type`:** **`transaction`**, **`credit_note`** (AR only),
        **`debit_note`** (AP only).

        **Document number:** omit **`invNumber`** on **create** for defaults
        (**`sinumber`/`vinumber`** â€” **`GET /system/companydefaults`**, **`GET
        /next_number/ar`** / **`ap`**).

        **Payments / files:** see **`ARAPTransactionWrite`**,
        **`ARAPTransactionWritePayment`**, **`FileUploadInline`**.

        **Vendor (AP) approval / workstation gate:** when **Neo AI plugin** is
        on and **`vc`** is **`vendor`**, and the **`stations`** table has any
        row (including inactive station records â€” see
        **`ARAPTransactionWrite`**), **`verify_station_access`** runs before
        posting **only on the approved path** (**`"pending": "0"`**). Drafts
        (**`"1"`** or omit **`pending`**) skip the deny branches. Errors:
        **`access_denied`** (**403**), **`amount_exceeded`** /
        **`no_amount_rules`** (**400**). See
        **`ARAPTransactionPostErrorResponse`**. AR (**`customer`**) has no
        equivalent.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
          description: Entity type.
        - in: path
          name: id
          required: false
          schema:
            type: integer
          description: Transaction ID for updates. Omit to create.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ARAPTransactionWrite"
            example:
              type: "transaction"
              customer_id: 5
              invDate: "2025-11-01"
              dueDate: "2025-11-30"
              curr: "CHF"
              pending: "0"
              recordAccount: "1100"
              lines:
                - account: "4000"
                  description: "Consulting"
                  amount: 1000.00
                  taxAccount: "2200"
              payments: []
              files:
                - name: "supporting-doc.pdf"
                  data: "data:application/pdf;base64,JVBERi0xLjQKJeLjz9MK"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ARAPTransactionWrite"
      responses:
        "200":
          description: Transaction saved. Returns the transaction ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
              example:
                id: 101
        "400":
          description: >-
            **`FieldConstraintError`** when **`curr`** is present and not exactly 3
            characters; otherwise **`amount_exceeded`**, **`no_amount_rules`**,
            **`file_upload_failed`**, malformed body, â€¦ (**`ARAPTransactionPostErrorResponse`**).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/FieldConstraintError"
                  - $ref: "#/components/schemas/ARAPTransactionPostErrorResponse"
              examples:
                field_length:
                  summary: Invalid ISO currency length on **`curr`**
                  value:
                    message: 'The field "curr" must be exactly 3 characters.'
                    code: field_length_invalid
                    field: curr
                    expected_length: 3
                amount_exceeded:
                  summary: Vendor AP exceeds workstation **`amount`** rule
                  value:
                    message: "Transaction amount (15000) exceeds allowed limit (10000)"
                    code: amount_exceeded
                no_amount_rules:
                  summary: User lacks **`all`** and **`amount`** rules on assigned stations
                  value:
                    message: "No amount approval rules found for user stations"
                    code: no_amount_rules
                file_upload_failed:
                  summary: Post succeeded but **`FM->upload_files`** failed
                  value:
                    message: "Failed to upload attachment: ..."
                    code: file_upload_failed
        "403":
          description: >-
            access_denied â€” vendor AP path with workstations armed, approved
            post (`pending` "0"), but caller has no usable station+approval-rule
            membership.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ARAPTransactionPostErrorResponse"
              example:
                message: "No station access permissions for this user"
                code: access_denied
        "500":
          description: >-
            post_transaction_failed (`code` in body) or unexpected server fault.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ARAPTransactionPostErrorResponse"
              example:
                message: "Failed to post transaction: ..."
                code: post_transaction_failed
    delete:
      tags:
        - AR/AP Transactions
      summary: Delete an AR or AP transaction
      description: Permanently deletes a transaction and its line items.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: vc
          required: true
          schema:
            type: string
            enum: [ customer, vendor ]
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Transaction ID to delete.
      responses:
        "204":
          description: Transaction deleted. No response body.

