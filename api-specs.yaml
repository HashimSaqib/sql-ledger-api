          description: Transaction reference
        - in: query
          name: description
          schema:
            type: string
          description: Transaction description
        - in: query
          name: name
          schema:
            type: string
          description: Company name
        - in: query
          name: lineitem
          schema:
            type: string
          description: Line item description
        - in: query
          name: source
          schema:
            type: string
          description: Transaction source
        - in: query
          name: memo
          schema:
            type: string
          description: Transaction memo
        - in: query
          name: datefrom
          schema:
            type: string
            format: date
          description: Transaction date from (YYYY-MM-DD)
        - in: query
          name: dateto
          schema:
            type: string
            format: date
          description: Transaction date to (YYYY-MM-DD)
        - in: query
          name: createdfrom
          schema:
            type: string
            format: date
          description: Record creation date from (YYYY-MM-DD)
        - in: query
          name: createdto
          schema:
            type: string
            format: date
          description: Record creation date to (YYYY-MM-DD)
        - in: query
          name: updatedfrom
          schema:
            type: string
            format: date
          description: Record update date from (YYYY-MM-DD)
        - in: query
          name: updatedto
          schema:
            type: string
            format: date
          description: Record update date to (YYYY-MM-DD)
        - in: query
          name: amountfrom
          schema:
            type: number
          description: Transaction amount from
        - in: query
          name: amountto
          schema:
            type: number
          description: Transaction amount to
        - in: query
          name: accnofrom
          schema:
            type: string
          description: Account number from
        - in: query
          name: accnoto
          schema:
            type: string
          description: Account number to
        - in: query
          name: department
          schema:
            type: string
          description: "Format: \"description--id\""
        - in: query
          name: project_id
          schema:
            type: string
