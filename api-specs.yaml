          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionLineItem"
              example:
                - id: 10334
                  transdate: "2024-12-01"
                  reference: "X-4"
                  description: "Initial capital contribution"
                  files:
                    - id: 5001
                      name: "bank-receipt.pdf"
                      link: "https://apineo.hashimsaqib.com/client/neoledger/files/8f3e2a1c9b0d7654"
                  name: "Client Corp"
                  vcnumber: "CUST-001"
                  address: "123 Main St"
                  department: "Finance--1"
                  project_description: "Q4 Financials"
                  debit: 5000000
                  credit: 0
                  linetax_account: "2120--VAT Payable"
                  linetaxamount: 374653.09
                  source: "Bank Statement"
                  memo: "Capital from investors"
                  accno: "1020"
                  account_description: "Bank Account"
                  gifi_accno: "1001"
                  contra: "2800"
                  created: "2024-12-01T10:15:30Z"
                  updated: "2024-12-01T10:15:30Z"
                  amount: 5000000
                  type: "gl"
                  till: false
                  invoice: false

  /gl/transactions:
    get:
      tags:
        - General Ledger
      summary: Retrieve general-ledger transactions based on query filters
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: datefrom
          schema:
            type: string
            format: date
          description: Transaction date from (YYYY-MM-DD)
        - in: query
          name: dateto
          schema:
            type: string
            format: date
          description: Transaction date to (YYYY-MM-DD)
        - in: query
          name: description
          schema:
            type: string
          description: Transaction description (case-insensitive partial match)
        - in: query
          name: notes
          schema:
            type: string
          description: Transaction notes (case-insensitive partial match)
        - in: query
          name: reference
          schema:
            type: string
          description: Transaction reference (case-insensitive partial match)
        - in: query
          name: accno
          schema:
            type: string
          description: Filter transactions that involve this account number
      responses:
        "200":
          description: >-
            Array of GL transactions matching the filters. Uses the same
            `GeneralLedger` schema. Note: `ts`, `employeeId`, `department`,
            `offset_accno`, `offset_tax_accno`, `pending`, and `taxincluded` are
            absent from list items â€” they only appear on `GET
            /gl/transactions/{id}`. With only `datefrom` (no `dateto`), the
            filter matches that exact date only.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeneralLedger"
              example:
                - id: 10334
                  reference: "X-4"
                  transdate: "2024-12-01"
                  description: "Initial capital contribution"
                  notes: "Starting capital for new venture"
                  curr: "CHF"
                  department_id: 1
                  approved: 1
                  exchangeRate: 1.0
                  created: "2024-12-01T10:15:30Z"
                  updated: "2024-12-01T10:15:30Z"
                  files:
                    - id: 5001
                      name: "bank-receipt.pdf"
                      link: "https://apineo.hashimsaqib.com/client/neoledger/files/8f3e2a1c9b0d7654"
                  lines:
                    - accno: "1020"
                      debit: 5000000
                      credit: 0
                      memo: "Capital deposit"
                      source: "Bank Statement"
                      taxAccount: 10025
                      linetaxamount: 374653.09
                      fx_transaction: false
                      cleared: false
                    - accno: "2800"
                      debit: 0
                      credit: 5000000
                      memo: "Share issuance"
                      source: "Share Certificate"
                      taxAccount: 10026
                      linetaxamount: 2500000
                      fx_transaction: false
                      cleared: false

    post:
      tags:
        - General Ledger
      summary: Create a new general-ledger transaction
      description: >-
        Requires **`gl.add`**. Request may be JSON or **`multipart/form-data`**
        (same as update). On **create**, omit **`reference`** (or leave blank)
        to assign from **`glnumber`** defaults (**`GET
        /system/companydefaults`**, or **`GET /next_number/gl`** to reserve a
        value first).
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneralLedger"
            example:
              curr: "CHF"
              exchangeRate: 1
              description: ""
              notes: ""
              reference: "X-4"
              transdate: "2024-12-01"
              lines:
                - accno: "1020"
                  credit: 0
                  debit: 5000000
                  memo: ""
                  source: ""
                  cleared: false
                  taxAccount: 10025
                  linetaxamount: 374653.098982424
                - accno: "2800"
                  credit: 5000000
                  debit: 0
                  memo: ""
                  source: ""
                  cleared: false
                  taxAccount: 10026
                  linetaxamount: 2500000
              files:
                - name: "capital-proof.pdf"
                  data: "data:application/pdf;base64,JVBERi0xLjQKJeLjz9MK"
      responses:
        "201":
          description: Transaction created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
              example:
                id: 10334
        "400":
          description: >-
            Validation or balance error (debits â‰  credits, unknown account), or
            **`FieldConstraintError`** when **`curr`** is not exactly 3 characters.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/FieldConstraintError"
                  - $ref: "#/components/schemas/ErrorResponse"

  /gl/transactions/{id}:
    get:
      tags:
        - General Ledger
      summary: Retrieve a general-ledger transaction by ID
      description: Requires `gl.add` permission (stricter than `gl.transactions` used
        for list and line search).
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The transaction ID
      responses:
        "200":
          description: The requested transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneralLedger"
              example:
                approved: 1
                curr: "CHF"
                department: null
                department_id: 0
                description: ""
                employeeId: null
                exchangeRate: 1.0
                id: 10334
                offset_accno: null
                offset_tax_accno: null
                pending: 0
                taxincluded: 0
                lines:
                  - accno: "1020"
                    cleared: null
                    credit: 0
                    debit: 5000000
                    fx_transaction: false
                    linetaxamount: 374653.098
                    memo: ""
                    project: null
                    source: ""
                    taxAccount: 10025
                  - accno: "2800"
                    cleared: null
                    credit: 5000000
                    debit: 0
                    fx_transaction: false
                    linetaxamount: 2500000
                    memo: ""
                    project: null
                    source: ""
                    taxAccount: 10026
                notes: ""
                reference: "X-4"
                transdate: "2024-12-01"
                ts: "2024-12-01T10:15:30Z"
                files:
                  - id: 5001
                    name: "bank-receipt.pdf"
                    link: "https://apineo.hashimsaqib.com/client/neoledger/files/8f3e2a1c9b0d7654"
        "404":
          description: Transaction not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "The requested GL transaction was not found."

    put:
      tags:
        - General Ledger
      summary: Update an existing general-ledger transaction
      description: Use **PUT** (not POST) with the transaction id in the path.
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The transaction ID to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneralLedger"
            example:
              curr: "CHF"
              exchangeRate: 1
              description: "Updated transaction description"
              notes: "Updated notes"
              reference: "X-4-UPDATED"
              transdate: "2024-12-01"
              lines:
                - accno: "1020"
                  credit: 0
                  debit: 5500000
                  memo: "Updated memo"
                  source: "Updated source"
                  cleared: false
                  taxAccount: 10025
                  linetaxamount: 411118.408880066
                - accno: "2800"
                  credit: 5500000
                  debit: 0
                  memo: "Updated memo"
                  source: "Updated source"
                  cleared: false
                  taxAccount: 10026
                  linetaxamount: 2750000
              files:
                - name: "amended-scan.pdf"
                  data: "data:application/pdf;base64,JVBERi0xLjQKJeLjz9MK"
      responses:
        "200":
          description: Transaction updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
              example:
                id: 10334
        "400":
          description: >-
            Validation or balance error, or **`FieldConstraintError`** when **`curr`**
            is not exactly 3 characters.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/FieldConstraintError"
                  - $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Transaction not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Transaction with ID 12345 not found."

    delete:
      tags:
        - General Ledger
      summary: Delete a general-ledger transaction
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The transaction ID to delete.
      responses:
        "204":
          description: Transaction deleted. No response body.
        "404":
          description: Transaction not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Transaction with ID 12345 not found."

  /arap/invoice/{vc}/{id}:
    get:
      tags:
        - Customers
      summary: Retrieve an AR or AP invoice by ID
      description: >-
        Returns full invoice JSON: line items, **`payments`**, tax summary,
        ship-to, and files. **`vc`** is **`customer`** (AR / sales invoice,
        **`SalesInvoice`** shape) or **`vendor`** (AP / purchase invoice â€” same
