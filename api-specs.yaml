        contra:
          type: integer
          enum: [ 0, 1 ]
          description: 1 = contra account (reverses normal debit/credit sign).
        taxkey:
          type: integer
          nullable: true
          description: Tax key used for VAT reporting.
        taxaccounts:
          type: string
          nullable: true
          description: Space-separated list of tax account numbers linked to this account.
        categories:
          type: array
          readOnly: true
          items:
            $ref: "#/components/schemas/ChartCategory"

    ChartAccountDetail:
      allOf:
        - $ref: "#/components/schemas/ChartAccount"
        - type: object
          description: >-
            Extended chart account with usage flags and rate information.
            Returned only by `GET /system/chart/accounts/{id}`.
          properties:
            has_transactions:
              type: boolean
              readOnly: true
              description: True if this account has posted transactions.
            has_defaults:
              type: boolean
              readOnly: true
              description: True if this account is referenced in system defaults.
            has_parts:
              type: boolean
              readOnly: true
              description: True if this account is linked to any part/service.

    Currency:
      type: object
      description: A currency supported by the system.
      properties:
        curr:
          type: string
          description: ISO 4217 currency code (e.g. CHF, EUR, USD).
          example: CHF
        prec:
          type: integer
          description: Number of decimal places for this currency (0â€“10).
          example: 2
        rn:
          type: integer
          readOnly: true
          description: Sort order. The currency with `rn=1` is the base currency.

    Department:
      type: object
      description: An organisational department used to classify transactions.
      properties:
        id:
          type: integer
          readOnly: true
          description: Department ID.
        description:
          type: string
          description: Department name.
        role:
          type: string
          enum: [ C, P ]
          maxLength: 1
          nullable: true
          description: >-
            Department role: `C` = cost centre, `P` = profit centre. PostgreSQL **`department.role`** is **`char(1)`**; at most one character when sent.
        rn:
          type: integer
          readOnly: true
          description: Sort order.
        transactions:
          type: integer
          enum: [ 0, 1 ]
          readOnly: true
          description: 1 if this department has associated transactions.

    TaxRate:
      type: object
      description: A tax rate configured in the system.
      properties:
        id:
          type: integer
          readOnly: true
        chart_id:
          type: integer
          description: ID of the linked chart account.
        accno:
          type: string
          description: Tax account number.
        description:
          type: string
          description: Tax account description.
        rate:
          type: number
          description: Tax rate as a decimal (e.g. 0.077 for 7.7%).
        taxnumber:
          type: string
          nullable: true
          description: Tax registration number.
        validto:
          type: string
          format: date
          nullable: true
          description: Date after which this rate expires (YYYY-MM-DD).

    # â”€â”€â”€ Items â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

    ItemSummary:
      type: object
      description: >-
        A catalogue line as returned from search or GET. The **`POST
        /ic/items/{id}`** route persists **services** only (no stock / assembly
        / kit payloads).
      properties:
        id:
          type: integer
          readOnly: true
          description: Part ID.
        partnumber:
          type: string
          description: Part or service number.
        description:
          type: string
          description: Part or service description.
        unit:
          type: string
          nullable: true
          description: Unit of measure.
        sellprice:
          type: number
          description: Default selling price.
        listprice:
          type: number
          nullable: true
          description: List / catalogue price.
        onhand:
          type: number
          description: Current stock quantity (0 for services).
        taxaccounts:
          type: string
          nullable: true
          description: Space-separated tax account numbers applied to this item.
        income_accno:
          type: string
          nullable: true
          description: Income account number (e.g. **`3400`** DienstleistungserlĂ¶se on
            Swiss charts).
        expense_accno:
          type: string
          nullable: true
          description: Expense / purchase account when used (link includes
            **`IC_expense`**).
        inventory_accno:
          type: string
          nullable: true
          description: >-
            Inventory (**empty** on services). **`POST /ic/items/{id}`** only
            supports service lines.

    ItemServiceUpsert:
      type: object
      description: >-
        **Upsert body for catalogue services only** (`POST /ic/items/{id}`, id **`0`** = create).
        **Income:** **`income_accno`** â€” chart **`accno`** string; rowâ€™s **`link`** must include **`IC_income`**.
        **Expense:** **`expense_accno`** â€” chart **`accno`** string; rowâ€™s **`link`** must include **`IC_expense`**.
        Both are **required on create**. On **update**, you may omit either field if the stored row already has that account.
        Do not send **`income_accno_id`**, **`IC_income`**, or other alternate shapes â€” they are rejected.
        Omit **`partnumber`** on create to assign from **`number_sequences.part`** in **`GET /system/companydefaults`**.
      additionalProperties: true
      properties:
        partnumber:
          type: string
          nullable: true
          description: >-
            Catalogue/service number. Omit or leave blank on **create** to
            allocate from **`number_sequences.part.pattern`** in **`GET
            /system/companydefaults`**.
        description:
          type: string
        unit:
          type: string
          maxLength: 5
          description: Unit abbreviation. Matches **`parts.unit`** **`varchar(5)`** in PostgreSQL.
        sellprice:
          type: number
        listprice:
          type: number
        notes:
          type: string
        income_accno:
          type: string
          example: "3400"
          description: >-
            **Required on create** (or omit on update if already stored). Chart **`accno`** for service revenue;
            **`link`** must include **`IC_income`**.
        expense_accno:
          type: string
          example: "4999"
          description: >-
            **Required on create** (or omit on update if already stored). Chart **`accno`** for expense / COGS;
            **`link`** must include **`IC_expense`**.
        taxaccounts:
          description: >-
            Swiss output VAT (e.g. **`34970`** MWST). Space-separated chart
            accnos or a JSON array; internal form uses `IC_tax_<accno>` checkbox
            fields.
          oneOf:
            - type: string
              example: "34970"
            - type: array
              items:
                type: string
              example: [ "34970" ]
        inventory_accno:
          type: string
          writeOnly: true
          deprecated: true
          description: Rejected for this route.
        inventory_accno_id:
          type: integer
          writeOnly: true
          deprecated: true
          description: Rejected for this route.
        assembly:
          type: boolean
          description: Rejected â€” assemblies are out of scope for this endpoint.

    NextNumberResponse:
      type: object
      description: >-
        The next value for a **`module`** counter. Patterns and lock flags are
        edited under **`GET /system/companydefaults`** (`number_sequences`).
        **Note:** catalogue **part/service** numbers use the same **defaults**
        but are **not** reserved through this endpoint â€” they are allocated when
        saving **`POST /ic/items/{id}`** if **`partnumber`** is empty.
      properties:
        number:
          type: string
          description: >-
            The next sequential number (e.g. "AR-2025-042"). Calling this
            endpoint increments the counter.
          readOnly: true

    CompanyDefaults:
      type: object
      description: >-
        Company configuration returned by **`GET /system/companydefaults`** and
        accepted (partially) by **`POST /system/companydefaults`**. Top-level
        sections mirror the API: **`company_info`** (name, address, contact,
        identifiers), **`settings`** (precision, rounding, reporting,
        `line_tax`, etc.), **`account_defaults`** (numeric chart ids for
        IC/AR/AP/etc.), **`number_sequences`** (pattern + `locked` booleans per
        sequence), **`all_accounts`** (reference pick list), and **`smtp`**
        (host metadata; password via separate server flow). Omitted POST
        sections are left unchanged.
      additionalProperties: true
      properties:
        company_info:
          type: object
          additionalProperties: true
        settings:
          type: object
          additionalProperties: true
        account_defaults:
          type: object
          additionalProperties: true
        number_sequences:
          type: object
          additionalProperties: true
          description: >-
            Templates such as `gl_reference`, `sales_invoice`, `customer`,
            `vendor`, `part`, etc. Each sub-key usually has `pattern` (string)
            and `locked` (boolean) where supported.
        all_accounts:
          type: array
          items: { type: object, additionalProperties: true }
        smtp:
          type: object
          additionalProperties: true

    CompanyDefaultsSaveResult:
      type: object
      description: Successful save from **`POST /system/companydefaults`**.
      properties:
        status:
          type: string
          enum: [ success ]
        message:
          type: string

    # â”€â”€â”€ Customers & Vendors â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

    VcParty:
