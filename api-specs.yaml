openapi: 3.0.0
info:
  title: SQL Ledger API
  version: "0.1"
  description: |
    Backend API for interacting with Neo-Ledger (modern remake of SQL-Ledger). While the entire backend is based on API, this documentation covers interacting with client data. For integrations, it is recommended to use an API key that can be created for a client in the user dashboard. You need to be owner of a dataset to create an API key. API key will grant the API access to the entire dataset (it is planned to introduce scops later on).  All dates will be in yyyy-mm-dd format. 

    **Path prefix** â€” All operations in this document are relative to **`servers[].url`**
    (typically **`/client/{client}`**), matching **`$r->under('/client/:client')`** in the server.

    **Documentation coverage** â€” This file describes the main integration routes (GL, AR/AP, invoices,
    company defaults, chart, catalogue services, workstations, etc.). The **`index.pl`** app defines
    additional endpoints (reports, batch, import, bank, projects, auth helpers, â€¦) that are **not**
    necessarily listed here; treat this spec as the **documented contract**, not an exhaustive route list.

    **HTTP methods**
      - **GET**: retrieve data  
      - **POST**: create records (and some updates, e.g. sales invoices via path or body).  
      - **PUT**: update records where supported (e.g. `PUT /gl/transactions/{id}`).  
      - **DELETE**: delete an object

    **Authentication**
      - **API Key** (recommended for server-side integrations):  
        include your dataset-specific key in the `X-API-Key` header  
      - **Session Key**:  
        obtain a short-lived key via `POST /login` with your credentials  
        send as `Authorization: <sessionKey>`  
        (grants access to all datasets your user account can reach).

    đź”§ **Server configuration**: Add your own API server by choosing the "Custom API Server" option below and entering your API url.

servers:
  # Added by API Auto Mocking Plugin
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/HASHIM1SAQIB/sql-ledger-api/0.1
  - description: A default testing server is provided. You can configure your own
      server for hosting by updating the host.
    url: https://{host}/client/{client}
    variables:
      host:
        default: apineo.hashimsaqib.com
        description: Enter your API Url
      client:
        default: neoledger
        description: Your database/client identifier

security:
  - ApiKeyAuth: []

tags:
  - name: Auth
    description: Authentication and API key validation
  - name: Customers & Vendors
    description: Customer and vendor (counterparty) search, detail, create, and update
  - name: General Ledger
    description: Endpoints for general ledger transactions
  - name: Customers
    description: Customer sales invoices (AR invoices)
  - name: AR/AP Transactions
    description: Non-invoice AR and AP transactions (charges, credit notes, debit notes)
  - name: Payments
    description: Payment lookups and cash receipt/payment posting
  - name: Reference Data
    description: >-
      System lookup tables â€” chart of accounts, currencies, departments, taxes,
      and **next-document** numbering (`GET /next_number/{module}`).
  - name: System
    description: >-
      Company-wide **defaults**: number-sequence templates, account defaults,
      SMTP and company master data (`GET`/`POST /system/companydefaults`).
  - name: Items
    description: Parts and services catalogue (inventory control)
  - name: Workstations
    description: >-
      **Neo AI plugin** workstation / approval workflow
      (`neo_ai_plugin/WorkStations.pl`). All paths are under the API server base
      **`â€¦/client/{client}`** (see **Servers**). Only active when that plugin
      loads.

      **Permissions:** **`stations.manage`** â€” list/write/delete stations and
      user assignments (**`GET /workstations*`** writes). **`stations.get`** â€”
      operator inbox (**`GET /workstations/user/stations`**).
      **`vendor.transaction`** â€” move invoices between stations (**`POST
      /workstations/transfer-invoice`**).

      **Scope:** Routings (**`invoice_station`**, **`GET â€¦/user/stations`**,
      **transfer**) target **vendor AP** documents (`ap.id`), not AR/customer
      invoices.

      **Approval rules** are stored per station in **`station_approval_rules`**.
      On save, if the JSON body includes a **`rules`** property (including
      **`"rules": []`**), the server deletes all rule rows for that station and
      inserts the list you send (**empty array â‡’ no rules**). If you **omit**
      the **`rules`** key entirely on update, rule rows are left unchanged. See
      **`StationRuleInput`** for valid **`rule_type`** / **`operator`** /
      **`condition_value`** combos.

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Your dataset-specific API key.

  schemas:

    # â”€â”€â”€ Shared â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

    ErrorResponse:
      type: object
      description: Standard error envelope returned by all error responses.
      properties:
        message:
          type: string
          description: Human-readable description of the error.
      required:
        - message

    FieldConstraintError:
      description: >-
        **`400`** when a string field violates a database-backed length limit before
        SQL runs. Same JSON shape as **`ErrorResponse`**: **`message`** only (human-readable,
        includes the field name and limit in the text).
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"

    IdResponse:
      type: object
      description: Minimal success envelope returned by create and update operations.
      properties:
        id:
          type: integer
          description: ID of the created or updated record.
      required:
        - id

    File:
      type: object
      description: >-
        **Read (GET):** One row from the server **`files`** table linked to the
        document by **`reference_id`** (same id as the invoice, GL batch, or
        AR/AP transaction). **`files`** in the JSON body is **`[]`** when
        nothing has been uploaded for that document yet â€” not a bug â€” and lists
        entries after **`POST`** with attachments succeeds.

        Each element has **`id`**, **`name`**, and **`link`**. The server always
        returns **`link`** as a **fully qualified URL** your frontend can use
        as-is (same field for local and cloud storage â€” no special casing
        needed).

        Omit **`files`** on write or send **`null`** unless you are attaching
        binaries (see **`FileUploadInline`** and multipart below).
      properties:
        id:
          type: integer
          readOnly: true
          description: Database id of this attachment row (`files.id`).
        name:
          type: string
          readOnly: true
          description: Original or stored filename.
        link:
          type: string
          format: uri
          readOnly: true
          description: Absolute URL to fetch or open the file (local and cloud backends
            normalized the same way).
      required:
        - id
        - link
        - name

    FileUploadInline:
      type: object
      description: >-
        **Write (POST with `application/json`):** Attach a file by embedding
        Base64 inside the payload. The handler decodes **`data`** and persists
        via **`FM->upload_files`**. Omit **`files`** or send **`[]`** when you
        have no uploads.
      required: [ name, data ]
      properties:
        name:
          type: string
          description: Original filename including extension (e.g. **`contract.pdf`**).
        data:
          type: string
          description: >-
            **Data URI**: **`data:<mime>;base64,<payload>`**. Example prefix:
            **`data:application/pdf;base64,JVBERi0x`**â€¦ The server strips the
            prefix and decodes the Base64 body (see **`decode_base64_files`** in
            `index.pl`).

    # â”€â”€â”€ General Ledger â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

    GeneralLedger:
      type: object
      description: >-
        Used for **write** (POST create, PUT update) and **read** (GET single).
        `readOnly` fields are returned on GET but ignored on write. The list
        endpoint (`GET /gl/transactions`) returns the same shape but omits `ts`,
        `employeeId`, `department`, `offset_accno`, `offset_tax_accno`,
        `pending`, and `taxincluded`. **`files`** is still included when
        attachments exist (**`[]`** otherwise).

        **Automatic reference:** On **create** (`POST /gl/transactions`), if
        **`reference`** is omitted, empty, or only whitespace, the server
        assigns it from **`glnumber`** defaults (see **`GET
        /system/companydefaults`** â†’ `number_sequences.gl_reference`).
      properties:
        id:
          type: integer
          readOnly: true
        reference:
          type: string
          nullable: true
          description: >-
            Transaction reference. Required on meaningful **updates** (`PUT`).
            On **POST create**, omit or leave blank to allocate from
            **`glnumber`** (**`GET /system/companydefaults`** / `GET
            /next_number/gl`).
        transdate:
          type: string
          format: date
          description: Transaction date (YYYY-MM-DD). Required on write.
        description:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        curr:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO currency code (e.g. "CHF"). Required on write. Matches PostgreSQL **`gl.curr`** **`char(3)`** â€” validated before posting.
        exchangeRate:
          type: number
          format: float
          description: Exchange rate relative to base currency. Required on write.
        department:
          type: string
          nullable: true
          description: >-
            Department label returned on GET single. On write, pass
            `"Description--id"` (same format used throughout the ledger).
        department_id:
          type: integer
          nullable: true
          readOnly: true
        approved:
          type: integer
          description: 1 = approved, 0 = pending. Set by the server.
          readOnly: true
        ts:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Internal posting timestamp. Only present on GET single.
        created:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        updated:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        employeeId:
          type: integer
          nullable: true
          readOnly: true
          description: Only present on GET single.
        offset_accno:
          type: string
          nullable: true
          readOnly: true
          description: Offset account number, if set. Only present on GET single.
        offset_tax_accno:
          type: string
          nullable: true
          readOnly: true
          description: Offset tax account number, if set. Only present on GET single.
        pending:
          type: integer
          description: 1 = not yet approved, 0 = approved. Only present on GET single.
          readOnly: true
        taxincluded:
          type: integer
          description: 1 = tax included in line amounts, 0 = tax added on top. Only
            present on GET single.
          readOnly: true
        lines:
          type: array
          items:
            $ref: "#/components/schemas/GeneralLedgerLine"
          description: Transaction line items. Required on write (must balance debits =
            credits).
        files:
          type: array
          items:
            $ref: "#/components/schemas/File"
          description: >-
            **GET** single (`GET /gl/transactions/{id}`): **`File`** refs for
            this GL id, or **`[]`** when no rows exist yet in **`files`**.

            **POST/PUT JSON:** set **`files`** to an array of
            **`FileUploadInline`** (`name` + **`data`** data-URI).
            **Multipart:** use repeated form field **`files`** (binary parts);
            do not rely on a JSON **`files`** array in the same request.

            **POST create response** from this API currently returns only **`{
            id }`** â€” re-**GET** the transaction to see populated **`files`**.
      required:
        - curr
        - exchangeRate
        - transdate
        - lines

    GeneralLedgerLine:
      type: object
      description: >-
        A single debit or credit line within a GL transaction. `debit` and
        `credit` are mutually exclusive â€” set the non-zero side, leave the other
        as `0`. They must balance across all lines in the transaction.
      properties:
        accno:
          type: string
          description: Chart-of-accounts account number. Required.
        debit:
          type: number
          description: Debit amount. Set to 0 when this is a credit line.
        credit:
          type: number
          description: Credit amount. Set to 0 when this is a debit line.
        linetaxamount:
          type: number
          description: >-
            Pre-calculated tax amount for this line. If `taxAccount` is set but
            `linetaxamount` is 0 or omitted, the server calculates it
            automatically.
        taxAccount:
          type: integer
          nullable: true
          description: Tax chart ID to apply to this line. Set to 0 or null for no tax.
        memo:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
          description: Source document reference (e.g. bank statement, invoice number).
        cleared:
          type: boolean
          nullable: true
          description: Bank reconciliation flag. Can be null before reconciliation.
        project:
          type: string
          nullable: true
          description: Project ID / number linked to this line (returned as string on GET).
          readOnly: true
        fx_transaction:
          type: boolean
          readOnly: true
          description: True when this line is part of a foreign-currency transaction.
      required:
        - accno
        - credit
        - debit
        - taxAccount
        - linetaxamount

    # â”€â”€â”€ GL line-search (GET /gl/transactions/lines) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

    TransactionLineItem:
      type: object
      description: >-
        One row returned by `GET /gl/transactions/lines`. Each row represents a
        single `acc_trans` entry with its parent transaction and account
        metadata joined in. All fields are read-only.
      properties:
        id:
          type: integer
          description: Parent transaction ID.
        transdate:
          type: string
          format: date
        reference:
          type: string
        description:
          type: string
          nullable: true
          description: Transaction-level description.
        files:
          type: array
          items:
            $ref: "#/components/schemas/File"
          description: >-
            Attachments tied to this GL transaction (**`reference_id`** = parent
            id); **`[]`** if none, otherwise same **`File`** shape as **`GET
            /gl/transactions/{id}`**.
        name:
          type: string
          nullable: true
          description: Vendor/customer company name (if linked).
        vcnumber:
          type: string
          nullable: true
          description: Vendor/customer number.
        address:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
          description: Department in `"Description--id"` format.
        project_description:
          type: string
          nullable: true
        debit:
          type: number
        credit:
          type: number
        linetax_account:
          type: string
          nullable: true
          description: Tax account(s) in `"accno--description"` format; comma-separated if
            multiple.
        linetaxamount:
          type: number
          nullable: true
        source:
          type: string
          nullable: true
        memo:
          type: string
          nullable: true
        accno:
          type: string
          description: Account number for this line.
        account_description:
          type: string
          nullable: true
        gifi_accno:
          type: string
          nullable: true
        contra:
          type: string
          nullable: true
        created:
          type: string
          format: date-time
          nullable: true
        updated:
          type: string
          format: date-time
          nullable: true
        amount:
          type: number
          description: Raw signed amount from `acc_trans`.
        type:
          type: string
          description: Transaction type â€” `gl`, `ar`, or `ap`.
        till:
          type: boolean
          description: True for point-of-sale transactions.
        invoice:
          type: boolean
          description: True for invoice-type transactions.

    # â”€â”€â”€ Sales Invoices â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

    SalesInvoice:
      type: object
      description: >-
        Customer **sales invoice** payload â€” write (POST create / POST update)
        and read (GET). `readOnly` fields are returned on GET but ignored on
        write. `discount` on lines is always expressed as a **percentage**
        (0â€“100).

        **Attachments (**`files`**, **`File`** / **`FileUploadInline`):** see
        the **`files`** property below â€” **`[]`** on GET simply means nothing is
        stored yet; use JSON data-URI objects or multipart **`files`** parts to
        upload after save.

        **Automatic numbers:** If **`invNumber`** is omitted or blank on
        **create**, the server allocates from **`sinumber`** defaults
        (`number_sequences.sales_invoice` in **`GET /system/companydefaults`**),
        consistent with **`GET /next_number/ar`**.

        **Payments:** The **`payments`** array records **instant payment lines**
        posted together with the invoice (e.g. cash received at sale time). Each
        row is an **`InvoicePayment`**: payment **`date`**, **`amount`**,
        bank/cash **`account`** (chart accno, e.g. `"1020"`), optional
        **`source`**, **`memo`**, and **`exchangerate`** (defaults to **`1`** if
        omitted). The server resolves **`account`** to a chart id and builds the
        receipt-side postings. **`payments`** may be **`[]`** or omitted for a
        fully unpaid document. To settle **already-open** invoices later,
        use **`POST /open_invoices/{vc}`** (`**customer**` for AR) instead of relying on
        invoice-body **`payments`**. **`GET /arap/payment/{vc}/{id}`**
        returns a balance summary (**`PaymentInfo`**), not the full payment line
        list.
      properties:
        id:
          type: integer
          readOnly: true
        customer_id:
          type: integer
          description: ID of the customer. Required on write.
        customernumber:
          type: string
          readOnly: true
          description: Customer number â€” assigned by the server, not writable.
        invNumber:
          type: string
          nullable: true
          description: >-
            Sales invoice number. Omit or leave blank on **create** to assign
            from system defaults (**`sales_invoice`** in **`GET
            /system/companydefaults`**).
        invDate:
          type: string
          format: date
          description: Invoice date (YYYY-MM-DD). Required on write.
        dueDate:
          type: string
          format: date
          description: Payment due date (YYYY-MM-DD). Required on write.
        ordNumber:
          type: string
          nullable: true
        poNumber:
          type: string
          nullable: true
          description: Customer purchase order number.
        description:
          type: string
          nullable: true
          description: Invoice-level description / subject line.
        notes:
          type: string
          nullable: true
          description: External notes (visible on printed invoice).
        intnotes:
          type: string
          nullable: true
          description: Internal notes (not printed).
        shippingPoint:
          type: string
          nullable: true
        shipVia:
          type: string
          nullable: true
        wayBill:
          type: string
          nullable: true
        recordAccount:
          type: string
          description: >-
            Accounts receivable control account accno (e.g. `"1100"`). Required
            on write.
        currency:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO currency code (e.g. "CHF"). Required on write. Must be exactly 3 characters; matches **`ar.curr`** **`char(3)`**.
        till:
          type: string
          nullable: true
          maxLength: 20
          description: Till / POS label. Matches **`ar.till`** **`varchar(20)`** when set.
        exchangerate:
          type: number
          format: float
          readOnly: true
          description: Effective exchange rate â€” resolved by the server from the
            transaction date.
        dcn:
          type: string
          nullable: true
          description: Document control number.
        department_id:
          type: integer
          readOnly: true
          description: Resolved from `department` string during posting.
        paymentmethod_id:
          type: integer
          nullable: true
          description: >-
            **`bank` row id** for Swiss QR / creditor metadata (not the same as
            cash postings in **`payments`**). Returned on **GET** invoice. May
            be echoed on **POST**; with no **`payments`** lines the UI often
            relies on this for QR routingâ€”use **`payments`** (`InvoicePayment`)
            when you need explicit bank/cash postings on the same request.
        type:
          type: string
          description: >-
            Transaction type. Use `"invoice"` for a normal sales invoice,
            `"credit_invoice"` for a credit note. Required on write.
        taxincluded:
          type: boolean
          description: >-
            `true` = line prices already include tax; `false` = tax is added on
            top. Defaults to `false`.
        lines:
          type: array
          items:
            $ref: "#/components/schemas/SalesInvoiceLine"
          description: Invoice line items. Required on write (at least one line).
        shipto:
          $ref: "#/components/schemas/ShipTo"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/InvoicePayment"
          description: >-
            **Payment lines** booked with this invoice (bank/cash **`account`**
            credited for receipts). Omit or use **`[]`** for â€śinvoice only, no
            settlementâ€ť. See **`InvoicePayment`**. For settling **existing**
            open AR invoices, use **`POST /open_invoices/customer`** (path **`vc`**
            **`customer`**).
        taxes:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceTax"
          description: >-
            Tax breakdown per tax account. On write, provide to override
            calculated amounts; omit to let the server calculate from line
            rates.
        files:
          type: array
          items:
            $ref: "#/components/schemas/File"
          description: >-
            **GET** invoice: list of **`File`** metadata for
            **`files.reference_id` = invoice `id`**. **`[]`** is normal when no
            attachments were ever stored.

            **POST** (`application/json`): array of **`FileUploadInline`** to
            upload after posting. **POST** (**`multipart/form-data`**): omit
            JSON **`files`**; send one or more parts named **`files`**.
            Successful save returns **`{ id }`** only â€” **`GET`** the invoice
            again for **`files`**.

      required:
        - customer_id
        - invDate
        - dueDate
        - currency
        - recordAccount
        - type
        - lines

    SalesInvoiceLine:
      type: object
      description: >-
        One line on a sales invoice. `number` (part/service ID) is required on
        write. All `readOnly` fields are returned on GET but ignored on write.
        `discount` is always a **percentage** (e.g. `10` = 10 %).
      properties:
        id:
          type: integer
          readOnly: true
          description: Line record ID â€” server-assigned.
        number:
          type: integer
          description: Part or service ID. Required on write.
        partnumber:
          type: string
          readOnly: true
          description: Part number string â€” resolved from `number` by the server.
        description:
          type: string
          description: Line description. Required on write.
        qty:
          type: number
          description: Quantity. Required on write.
        unit:
          type: string
          nullable: true
          maxLength: 10
          description: Unit of measure. Matches PostgreSQL **`invoice.unit`** **`varchar(10)`**.
        price:
          type: number
          description: Unit price. Required on write.
        discount:
          type: number
          description: Discount percentage (0â€“100). E.g. `10` = 10 %.
        lineitemdetail:
          type: boolean
          description: Show expanded line-item detail on printed invoice.
        itemnotes:
          type: string
          nullable: true
        deliverydate:
          type: string
          format: date
          nullable: true
        ordernumber:
          type: string
          nullable: true
        serialnumber:
          type: string
          nullable: true
        customerponumber:
          type: string
          nullable: true
        project:
          type: string
          nullable: true
          description: Project ID / number linked to this line.
        cost:
          type: number
          readOnly: true
          description: Cost of goods â€” server-resolved.
        costvendor:
          type: string
          nullable: true
          readOnly: true
        costvendorid:
          type: integer
          readOnly: true
        onhand:
          type: number
          readOnly: true
        weight:
          type: number
          readOnly: true
        netweight:
          type: number
          nullable: true
          readOnly: true
