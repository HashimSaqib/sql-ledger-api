            Override the auto-calculated tax. Omit to let the server calculate.
        project:
          type: string
          nullable: true
          description: Project number to assign to this line.

    ARAPTransactionWritePayment:
      type: object
      description: >-
        One **payment line** included in **`POST /arap/transaction/{vc}/{id}`**.
        Each row creates a paired posting to **`account`** (bank/cash accno)
        alongside the AR/AP document. Use **`[]`** when there is no immediate
        settlement. Optional **`exchangerate`** (default **1**). When
        **`payments`** is empty, you may still pass **`paymentmethod_id`** for
        QR/bank metadata (see server comment in `index.pl` / Swiss QR).
      required: [ date, amount, account ]
      properties:
        date:
          type: string
          format: date
          description: Payment date (YYYY-MM-DD).
        amount:
          type: number
          description: Payment amount.
        account:
          type: string
          description: Bank/cash account number (e.g. "1020").
        source:
          type: string
          nullable: true
          description: Payment reference.
        memo:
          type: string
          nullable: true
        exchangerate:
          type: number
          nullable: true
          description: Exchange rate for foreign-currency payments.

    ARAPTransactionWriteTax:
      type: object
      description: >-
        Manual tax override. Only needed when taxes are not driven by
        `taxAccount` on the line items.
      required: [ accno, amount ]
      properties:
        accno:
          type: string
          description: Tax account number.
        amount:
          type: number
          description: Tax amount.

    ARAPTransactionWrite:
      type: object
      description: >-
        Request body for creating or updating an AR/AP transaction (**`POST
        /arap/transaction/{vc}/{id}`**). **Important:** currency must be sent as
        **`curr`** (not **`currency`**).

        **Automatic numbers:** If **`invNumber`** is omitted or blank on
        **create**, the document number is taken from **`sinumber`** /
        **`vinumber`** defaults (**`GET /system/companydefaults`** â†’
        `number_sequences`), same family as **`GET /next_number/ar`** or **`GET
        /next_number/ap`**.

        **Payments:** **`payments`** is an array of
        **`ARAPTransactionWritePayment`** (one row per bank/cash posting with
        the document). Use **`[]`** if nothing is paid at creation. For later
        settlement of open invoices, **`POST /open_invoices/{vc}`**. Optional
        **`paymentmethod_id`** wires Swiss-QR / default **bank** metadata when
        there are no payment rows.

        **Vendor (AP) workstation approvals (Neo AI plugin):** when the AI
        plugin loads and **`vc`** is **`vendor`**, **`verify_station_access`**
        runs **before** **`AA->post_transaction`** whenever the **`stations`**
        table has **any** rows (**`SELECT * FROM stations`** ignores
        **`is_active`** â€” any row, even on an â€śinactiveâ€ť station record, turns
        the subsystem on). It inspects active `station_users` rows
        (`su.is_active`) joined to active `station_approval_rules`
        (`sar.is_active`) for the authenticated `profile.id`.

        â€˘ Posting `"pending": "0"` (**approved** immediately): require either an
        `all` rule on the user's matched stations, or â€” under `amount` rules
        only â€” that the document total (sum of `lines[].amount` plus computed
        taxes from `taxAccount`/`taxAmount` on lines or entries in `taxes`) is
        **â‰¤** the **maximum** numeric `condition_value` across those `amount`
        rules (Perl takes the highest threshold).

        â€˘ Posting `"pending": "1"` (**or omitting `pending`** â€” both set
        internal **pending** truthy before the ledger) **skips denial** branches
        of **`verify_station_access`** (**`access_denied`**,
        **`amount_exceeded`**, **`no_amount_rules`** â€” see
        **`ARAPTransactionPostErrorResponse`**), so drafts can bypass those
        gates.

        There is **no** equivalent gate for **`vc`** **`customer`** (AR paths
        never call **`verify_station_access`**).

        Approval rules/stations are administered via **`/workstations*`**
        (**Workstations** tag).
      required: [ type, invDate, lines ]
      properties:
        type:
          type: string
          enum: [ transaction, credit_note, debit_note ]
          description: >-
            Document type: `transaction` (normal AR debit / AP credit),
            `credit_note` (AR), `debit_note` (AP).
        customer_id:
          type: integer
          nullable: true
          description: Customer ID. Required for vc=customer.
        vendor_id:
          type: integer
          nullable: true
          description: Vendor ID. Required for vc=vendor.
        invNumber:
          type: string
          nullable: true
          description: >-
            Document number. Omit or blank on **create** to assign from
            **`sinumber`** / **`vinumber`** defaults (`number_sequences` in
            **`GET /system/companydefaults`**).
        invDate:
          type: string
          format: date
          description: Transaction date (YYYY-MM-DD).
        dueDate:
          type: string
          format: date
          nullable: true
          description: Payment due date.
        executionDate:
          type: string
          format: date
          nullable: true
          description: Value date / execution date.
        curr:
          type: string
          minLength: 3
          maxLength: 3
          description: Currency code (e.g. CHF). Note â€” field name is `curr`, not
            `currency`. Must be exactly 3 characters when sent. Matches **`ar.curr`**
            / **`ap.curr`** **`char(3)`**.
        exchangerate:
          type: number
          nullable: true
          description: Exchange rate against the base currency. Defaults to 1.
        pending:
          type: string
          enum: [ "0", "1" ]
          description: >-
            Mirrors SQL-Ledger **`pending`** / approval flag passed into
            **`AA->post_transaction`**.

            **Critical â€” defaults:** The server maps **`"pending"`** **`"0"`**
            to â€śpost **approved**/finalâ€ť (internal **`$form->{pending}`** falsy
            â‡’ workstation **`verify_station_access`** gates **apply** for AP
            when the Neo AI plugin and **`stations`** rows exist). **Any value
            other than the string **`"0"`** â€” including omission of the JSON
            field â€” resolves to **`pending`** truthy**, i.e. â€śsave pendingâ€ť and
            **those denial checks are skipped** (Perl: **`$data->{pending} eq
            '0' ? undef : 1`**).

            Use **`"0"`** explicitly when you intend an immediate booked AP
            transaction subject to workstation rules; use **`"1"`** (or omit)
            for draft/pending payloads that bypass that enforcement.
        recordAccount:
          type: string
          description: AR or AP control account number (e.g. "1100").
        department:
          type: string
          nullable: true
          description: Department name or ID.
        ordNumber:
          type: string
          nullable: true
        poNumber:
          type: string
          nullable: true
        dcn:
          type: string
          nullable: true
          description: Document control number.
        notes:
          type: string
          nullable: true
          description: External notes.
        intnotes:
          type: string
          nullable: true
          description: Internal notes.
        paymentmethod_id:
          type: integer
          nullable: true
          description: >-
            **`bank`** table id for QR / default creditor-debtor routing when
            **`payments`** has no rows (same pattern as invoice). Does not
            replace explicit **`payments`** lines.
        vc_bank_id:
          type: integer
          nullable: true
          description: Bank account ID of the customer/vendor.
        lines:
          type: array
          description: Line items. At least one line is required.
          items:
            $ref: "#/components/schemas/ARAPTransactionWriteLine"
        payments:
          type: array
          description: >-
            **Payment lines** at posting time; each item is
            **`ARAPTransactionWritePayment`** (`date`, `amount`, `account`
            accno, â€¦). Default **`[]`**.
          items:
            $ref: "#/components/schemas/ARAPTransactionWritePayment"
        taxes:
          type: array
          nullable: true
          description: Manual tax overrides. Ignored when line-level `taxAccount` is set.
          items:
            $ref: "#/components/schemas/ARAPTransactionWriteTax"
        taxincluded:
          type: boolean
          description: True if line amounts already include tax.
          default: false
        files:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/File"
          description: >-
            **Optional on POST.** JSON body: **`FileUploadInline`** objects
            (`name` + data-URI **`data`). Multipart: repeated part **`files`**.
            Persisted via **`FM->upload_files`** after the document posts;
            unsuccessful upload yields **`file_upload_failed`**. Omit or
            **`[]`** when attaching nothing.

